name: Traction Radar

on:
  schedule:
    # 06:15 UTC daily. GitHub schedules can lag 5-20 min under load — that's fine.
    - cron: "15 6 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed to commit the updated feed + snapshots

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytrends

      - name: Run radar
        run: python scripts/radar.py

      - name: Commit results
        run: |
          git config user.name "traction-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "radar: update feed $(date -u +%Y-%m-%d)"
            git push
          fi
